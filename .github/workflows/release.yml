name: Release Pipeline

on:
  push:
    branches:
      - main

concurrency:
  group: npm-release
  cancel-in-progress: false

jobs:

  dry-run:
    name: Dry Run Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: npm ci

      - name: Verify npm auth
        run: npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Preview publish
        run: npm publish --dry-run
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish:
    name: Approve → Publish to npm
    needs: dry-run
    runs-on: ubuntu-latest

    environment:
      name: npm-publish

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Publish package
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Get package version
        id: version
        run: |
          echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          body: |
            # @codepenguin/adsense-simulator

            A lightweight development tool that simulates **Google AdSense runtime behavior** locally.

            This allows developers to test ad placements, layouts, and click flows **without contacting Google servers**.

            ⚠️ Intended for **development only**.  
            Do not use this simulator in production environments.

            ---

            ## Installation

            ```bash
            npm install @codepenguin/adsense-simulator
            ```

            ---

            ## Usage

            ```javascript
            import "@codepenguin/adsense-simulator"
            ```

            Once imported, the simulator automatically detects `.adsbygoogle` slots and renders simulated ads.

            ---

            ## Example Ad Slot

            ```html
            <ins
              class="adsbygoogle"
              style="display:block;width:300px;height:250px"
              data-ad-client="ca-pub-demo"
              data-ad-slot="123456">
            </ins>

            <script>
            (adsbygoogle = window.adsbygoogle || []).push({});
            </script>
            ```

            ---

            ## CDN Usage

            ```html
            <script src="https://cdn.jsdelivr.net/npm/@codepenguin/adsense-simulator/dist/adsense-simulator.min.js?removeGoogleAds=true"></script>            ```

            ---

            ## Simulated Features

            - `.adsbygoogle` slot detection
            - `adsbygoogle.push()` queue behavior
            - responsive ad sizing
            - container-based rendering
            - dynamic DOM insertion detection
            - click simulation
            - ad metadata inspection

            ---

            ## Repository

            https://github.com/clowneon1/adsense-simulator

            ---

            ## License

            MIT