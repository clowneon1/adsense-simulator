name: Release Pipeline

on:
  push:
    branches:
      - main

concurrency:
  group: npm-release
  cancel-in-progress: false

jobs:

  check-version:
    name: Check Version Changed
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
      version: ${{ steps.check.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect version change
        id: check
        run: |
          if git diff HEAD~1 -- package.json | grep -q '"version"'; then
            VERSION=$(node -p "require('./package.json').version")
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "Version changed to $VERSION"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No version change detected, skipping release pipeline"
          fi

  dry-run:
    name: Dry Run Publish
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: npm ci

      - name: Verify npm auth
        run: npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify dist
        run: |
          test -f dist/adsense-simulator.js
          test -f dist/adsense-simulator.min.js
          test -f dist/adsense-simulator.dev.js
          echo "✅ dist files verified"

      - name: Preview publish
        run: npm publish --dry-run
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish:
    name: Approve → Publish to npm
    needs: [check-version, dry-run]
    if: needs.check-version.outputs.changed == 'true'
    runs-on: ubuntu-latest

    environment:
      name: npm-publish

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: npm ci

      - name: Verify dist
        run: |
          test -f dist/adsense-simulator.js
          test -f dist/adsense-simulator.min.js
          test -f dist/adsense-simulator.dev.js
          echo "✅ dist files verified before publish"

      - name: Publish package
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          generate_release_notes: true
          body: |
            # @codepenguin/adsense-simulator

            A lightweight development tool that simulates **Google AdSense runtime behavior** locally.

            This allows developers to test ad placements, layouts, and click flows **without contacting Google servers**.

            ⚠️ Intended for **development only**.
            Do not use this simulator in production environments.

            ---

            ## Installation

            ```bash
            npm install @codepenguin/adsense-simulator
            ```

            ---

            ## Usage

            ```javascript
            import "@codepenguin/adsense-simulator";
            ```

            Once imported, the simulator automatically detects `.adsbygoogle` slots and renders simulated ads.

            ---

            ## Example Ad Slot

            ```html
            <ins
              class="adsbygoogle"
              style="display:block;width:300px;height:250px"
              data-ad-client="ca-pub-demo"
              data-ad-slot="123456">
            </ins>

            <script>
            (adsbygoogle = window.adsbygoogle || []).push({});
            </script>
            ```

            ---

            ## CDN Usage

            ```html
            <script
              src="https://cdn.jsdelivr.net/npm/@codepenguin/adsense-simulator/dist/adsense-simulator.min.js"
              data-remove-google-ads="true">
            </script>
            ```

            > ⚠️ Do **not** use `?removeGoogleAds=true` query params — CDNs (jsDelivr, unpkg) strip query strings before serving files. Use the `data-remove-google-ads="true"` attribute instead.

            ---

            ## Simulated Features

            - `.adsbygoogle` slot detection
            - `adsbygoogle.push()` queue behavior
            - responsive ad sizing
            - container-based rendering
            - dynamic DOM insertion detection
            - SPA navigation support (pushState / replaceState)
            - browser back/forward navigation (popstate)
            - bfcache (Back-Forward Cache) restoration
            - click simulation
            - ad metadata inspection
            - optional multi-layer blocking of real AdSense script

            ---

            ## Repository

            https://github.com/clowneon1/adsense-simulator

            ---

            ## License

            MIT
