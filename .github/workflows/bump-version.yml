name: Bump Version

on:
  pull_request:
    types: [labeled]

jobs:
  bump:
    if: |
      github.event.label.name == 'release:major' ||
      github.event.label.name == 'release:minor' ||
      github.event.label.name == 'release:patch'
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install deps
        run: npm ci

      - name: Bump version (no tag yet)
        run: |
          if [[ "${{ github.event.label.name }}" == "release:major" ]]; then
            npm version major --no-git-tag-version
          elif [[ "${{ github.event.label.name }}" == "release:minor" ]]; then
            npm version minor --no-git-tag-version
          else
            npm version patch --no-git-tag-version
          fi

      - name: Build dist
        run: npm run build

      - name: Commit version + dist and create tag
        run: |
          VERSION=$(node -p "require('./package.json').version")
          git add package.json dist/
          git commit -m "release: $VERSION"
          git tag "v$VERSION"

      - name: Push commit and tag
        run: git push && git push --tags
