name: Require Release Label

on:
  pull_request:
    types: [opened, edited, labeled, unlabeled, synchronize]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Check PR labels
        run: |
          LABELS="${{ join(github.event.pull_request.labels.*.name, ' ') }}"

          if [[ "$LABELS" == *"release:major"* ]] || \
             [[ "$LABELS" == *"release:minor"* ]] || \
             [[ "$LABELS" == *"release:patch"* ]] || \
             [[ "$LABELS" == *"release:workflow"* ]]; then
            echo "✅ Valid release label detected"
          else
            echo "❌ PR must include one of the following labels:"
            echo "  release:major  — breaking changes or major new features"
            echo "  release:minor  — new non-breaking features"
            echo "  release:patch  — bug fixes"
            echo "  release:workflow — CI/workflow-only changes, no version bump"
            exit 1
          fi
