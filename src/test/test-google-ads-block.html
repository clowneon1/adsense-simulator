<!doctype html>

<html>
  <head>
    <meta charset="UTF-8" />
    <title>AdSense Simulator – Google Script Block Test</title>

    <style>
      body {
        font-family: Arial;
        background: #f4f6f8;
        margin: 0;
        padding: 30px;
      }

      .section {
        margin-bottom: 40px;
        background: white;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 3px 8px rgba(0, 0, 0, 0.1);
      }

      .ads {
        margin-top: 15px;
      }
    </style>

    <!-- REAL ADSENSE SCRIPT (should be blocked) -->

    <script
      async
      src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js"
    ></script>

    <!-- SIMULATOR -->

    <script src="../../dist/adsense-simulator.min.js?removeGoogleAds=true"></script>
  </head>

  <body>
    <h1>AdSense Simulator Script Blocking Test</h1>

    <p>
      Open the browser console to confirm that the Google AdSense script is
      blocked.
    </p>

    <div class="section">
      <h2>Static Ad Slot</h2>

      <ins
        class="adsbygoogle ads"
        style="display: block; width: 300px; height: 250px"
        data-ad-client="ca-pub-demo"
        data-ad-slot="100001"
      >
      </ins>
    </div>

    <div class="section">
      <h2>Responsive Ad Slot</h2>

      <ins
        class="adsbygoogle ads"
        style="display: block"
        data-ad-client="ca-pub-demo"
        data-ad-slot="100002"
        data-ad-format="auto"
      >
      </ins>
    </div>

    <div class="section">
      <h2>Dynamic Script Injection (Should Be Blocked)</h2>

      <button onclick="injectGoogleScript()">Inject Google Script</button>
    </div>

    <div class="section">
      <h2>Delayed Script Injection</h2>

      <p>Google script will attempt to load after 3 seconds.</p>
    </div>

    <script>
      (adsbygoogle = window.adsbygoogle || []).push({});

      function injectGoogleScript() {
        const s = document.createElement("script");

        s.src =
          "https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js";

        document.head.appendChild(s);

        console.log("Injected Google script");
      }

      setTimeout(() => {
        const s = document.createElement("script");

        s.src =
          "https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js";

        document.head.appendChild(s);

        console.log("Delayed Google script injected");
      }, 3000);
    </script>
  </body>
</html>
